<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report DOT Harian - PT. UNIFAM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#0f1419;
    --panel:#171d26;
    --panel2:#1e2530;
    --border:#2a3340;
    --text:#e8edf2;
    --muted:#8a97a8;
    --hit:#2ecc71;
    --miss:#e74c3c;
    --accent:#3b82f6;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding-bottom:60px;
  }
  header{
    padding:16px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:10;
  }
  header h1{
    font-size:17px;
    margin:0 0 10px;
    font-weight:700;
  }
  .datebar{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .datebar input[type=date]{
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 10px;
    border-radius:8px;
    font-size:14px;
    flex:1;
  }
  .datebar button{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:9px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
  }
  main{padding:14px;}
  .status{color:var(--muted);font-size:13px;margin:8px 0 16px;text-align:center;}

  .overall{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:20px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:12px 8px;
    text-align:center;
  }
  .stat .num{font-size:20px;font-weight:800;}
  .stat .label{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat.hit .num{color:var(--hit);}
  .stat.miss .num{color:var(--miss);}
  .stat.pct .num{color:var(--accent);}

  .section-title{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--muted);
    margin:22px 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .card-title{font-weight:700;font-size:15px;}
  .card-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .mini-stats{
    display:flex;
    gap:10px;
    font-size:12px;
    margin-top:8px;
    color:var(--muted);
  }
  .mini-stats b{color:var(--text);}
  .pctbadge{
    font-size:13px;
    font-weight:800;
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
  }
  .pctbadge.good{background:rgba(46,204,113,.15);color:var(--hit);}
  .pctbadge.bad{background:rgba(231,76,60,.15);color:var(--miss);}

  .card-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .btn{
    flex:1;
    text-align:center;
    padding:9px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    border:1px solid var(--border);
    background:var(--panel2);
    color:var(--text);
    text-decoration:none;
    display:block;
  }
  .btn.wa{
    background:#25D366;
    color:#04250f;
    border:none;
  }
  .btn.wa-konfirmasi{
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
  }
  .phone-input{
    width:100%;
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 10px;
    border-radius:8px;
    font-size:13px;
    margin-top:8px;
  }
  details{margin-top:10px;}
  summary{font-size:12px;color:var(--muted);cursor:pointer;}
  .detail-row{
    font-size:12px;
    padding:6px 0;
    border-top:1px solid var(--border);
    color:var(--muted);
  }
  .detail-row b{color:var(--text);}
  .empty{
    text-align:center;
    color:var(--muted);
    padding:30px 0;
    font-size:13px;
  }
  .tabs{
    display:flex;
    gap:8px;
    margin:16px 0 12px;
    background:var(--panel2);
    padding:4px;
    border-radius:10px;
    border:1px solid var(--border);
  }
  .tab-btn{
    flex:1;
    text-align:center;
    padding:9px 6px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    background:transparent;
    color:var(--muted);
    border:none;
  }
  .tab-btn.active{
    background:var(--accent);
    color:#fff;
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .dot-detail{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:2px 12px;
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
  }
  .dot-detail span b{color:var(--text);font-weight:600;}

  .alert-card{
    background:var(--panel);
    border:1px solid rgba(231,76,60,.35);
    border-left:3px solid var(--miss);
    border-radius:var(--radius);
    padding:14px;
    margin-bottom:10px;
  }
  .alert-days{
    font-size:12px;
    font-weight:800;
    color:var(--miss);
    background:rgba(231,76,60,.12);
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
  }
  .alert-links{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .alert-links a{
    font-size:12px;
    padding:7px 10px;
    border-radius:7px;
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
    text-decoration:none;
  }
  .badge-count{
    background:var(--miss);
    color:#fff;
    font-size:11px;
    font-weight:800;
    border-radius:10px;
    padding:1px 7px;
    margin-left:4px;
  }
</style>
</head>
<body>

<header>
  <h1>📊 Report Delivery On Time</h1>
  <div class="datebar">
    <input type="date" id="reportDate">
    <button onclick="loadReport()">Refresh</button>
  </div>
</header>

<main>
  <div class="status" id="status">Memuat data...</div>

  <div class="overall" id="overallStats" style="display:none;">
    <div class="stat hit"><div class="num" id="ovHit">0</div><div class="label">HIT</div></div>
    <div class="stat miss"><div class="num" id="ovMiss">0</div><div class="label">MISS</div></div>
    <div class="stat"><div class="num" id="ovTotal">0</div><div class="label">TOTAL</div></div>
    <div class="stat pct"><div class="num" id="ovPct">0%</div><div class="label">OTD</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabBtnExp" onclick="switchTab('exp')">📦 Konfirmasi Ekspedisi</button>
    <button class="tab-btn" id="tabBtnDist" onclick="switchTab('dist')">🏢 Distributor</button>
    <button class="tab-btn" id="tabBtnAlert" onclick="switchTab('alert')">🔔 Cek Sandar<span class="badge-count" id="alertBadge" style="display:none;">0</span></button>
  </div>

  <div class="tab-panel active" id="panelExp">
    <div id="expedisiList"></div>
  </div>
  <div class="tab-panel" id="panelDist">
    <div id="distributorList"></div>
  </div>
  <div class="tab-panel" id="panelAlert">
    <div class="status" style="margin-top:0;">Kontainer dengan ETA lewat &amp; belum ada tanggal Arrival di sheet (dicek dari SEMUA data, bukan cuma tanggal terpilih)</div>
    <div id="alertList"></div>
  </div>
</main>

<script>
const SHEET_ID = '1Jz-0kcWJh1ltcqLy_QfL7he9dauXUf4gonOXdwhMfrc';
const GID = '1495795913'; // tab "Plan Delivery 2026"
const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vSGz9K1a7v-1BFLSWdCjrboAwAcg8w1fYK98pdGhdEHqj_q9hnqvRWjPdt1UubexOQ_IgOy7QGPS-3G/pub?gid=${GID}&single=true&output=csv`;

// header di row 1, data mulai row 2
const SHEET_ID2 = '1eqhRDFXQysByjjKSkYziJ9zmubGWm2uZCWZpPaARho8';
const GID2 = '1963608809'; // tab "Konfirmasi Armada"
const CSV_URL2 = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQWWl6xUcwoS3ym-dPPunI4XIWrZoi8VbeKDV-myqhTIdpsBGM7AgzXXWUFidZJTFjXgCyGANUR-vjf/pub?gid=${GID2}&single=true&output=csv`;
const COL2 = {
  NO_ORDER: 1,
  EKSPEDISI: 2,
  TUJUAN: 4,
  TGL_MUAT: 5,
  NOPOL: 9,
  NO_KONTENER: 10,
  ETD: 12,
  ETA: 13
};

function normalizeContainer(str){
  return (str||'').toString().replace(/\s+/g,'').toUpperCase();
}

// ==== Sheet konfirmasi distributor: kontainer & truck "belum bongkar" ====
const SHEET_ID4 = '1zwa_DGFf98Oz4fCkeDYG9_Z5P-h943uDOE5vE4Cy_K8';
const GID_KONTAINER_BONGKAR = '2146963194';
const GID_TRUCK_BONGKAR = '332221148';
const CSV_URL_KONTAINER_BONGKAR = `https://docs.google.com/spreadsheets/d/e/2PACX-1vS5DYccCkQ-4CubMoR655MsH-DYNuwipMvTPSQ9zL9UBLMsuJkZWLyxWPc0X4y4tBQB1OQAUCSi07cr/pub?gid=${GID_KONTAINER_BONGKAR}&single=true&output=csv`;
const CSV_URL_TRUCK_BONGKAR = `https://docs.google.com/spreadsheets/d/e/2PACX-1vS5DYccCkQ-4CubMoR655MsH-DYNuwipMvTPSQ9zL9UBLMsuJkZWLyxWPc0X4y4tBQB1OQAUCSi07cr/pub?gid=${GID_TRUCK_BONGKAR}&single=true&output=csv`;

// Kontainer: A BULAN,B TglKirim,C DESTINATION,D NO CONTAINER,E EXPEDISI,F SANDAR,G KET.DOORING,H DOORING,I STANDBY,...
const COL_KONTAINER_BONGKAR = { DESTINATION: 2, IDENTIFIER: 3, EXPEDISI: 4, ARRIVAL: 5, STATUS: 6, BONGKAR_DATE: 7 };
// Truck: A BULAN,B TglKirim,C DESTINATION,D PLAT NO MOBIL,E EXP,F TGL TIBA GUDANG,G JAM TIBA,H KET.BONGKAR,I TGL BONGKAR,...
const COL_TRUCK_BONGKAR = { DESTINATION: 2, IDENTIFIER: 3, EXPEDISI: 4, ARRIVAL: 5, STATUS: 7, BONGKAR_DATE: 8 };

const BULAN_ID = {januari:0,februari:1,maret:2,april:3,mei:4,juni:5,juli:6,agustus:7,september:8,oktober:9,november:10,desember:11};
function parseIndonesianDate(str){
  if(!str) return null;
  str = str.toString().trim().toLowerCase();
  const m = str.match(/^(\d{1,2})\s+([a-z]+)\s+(\d{4})$/);
  if(!m) return null;
  const month = BULAN_ID[m[2]];
  if(month===undefined) return null;
  return new Date(parseInt(m[3]), month, parseInt(m[1]));
}

async function fetchBongkarSheet(url, col, type){
  const rows = [];
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const csvText = await res.text();
    const parsed = Papa.parse(csvText, {skipEmptyLines:false});
    const dataRows = parsed.data.slice(1); // skip header row 1
    dataRows.forEach(r=>{
      const identifier = (r[col.IDENTIFIER]||'').toString().trim();
      const destination = (r[col.DESTINATION]||'').toString().trim();
      if(!identifier && !destination) return;
      const status = (r[col.STATUS]||'').toString().trim().toUpperCase();
      if(status === 'SUDAH BONGKAR') return; // sudah selesai, skip
      rows.push({
        type: type,
        destination: destination,
        identifier: identifier,
        expedisi: (r[col.EXPEDISI]||'').toString().trim() || 'TANPA EKSPEDISI',
        arrivalDate: parseIndonesianDate(r[col.ARRIVAL]),
        status: status
      });
    });
  }catch(err){
    console.warn('Gagal ambil data bongkar ('+type+'):', err.message);
  }
  return rows;
}

async function fetchDistributorPending(){
  const [kontainerRows, truckRows] = await Promise.all([
    fetchBongkarSheet(CSV_URL_KONTAINER_BONGKAR, COL_KONTAINER_BONGKAR, 'kontainer'),
    fetchBongkarSheet(CSV_URL_TRUCK_BONGKAR, COL_TRUCK_BONGKAR, 'truck')
  ]);
  return kontainerRows.concat(truckRows);
}


async function fetchKonfirmasiArmada(){
  const map = {};
  try{
    const res = await fetch(CSV_URL2);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const csvText = await res.text();
    const parsed = Papa.parse(csvText, {skipEmptyLines:false});
    const dataRows = parsed.data.slice(1); // skip header row 1
    dataRows.forEach(r=>{
      const noKontener = normalizeContainer(r[COL2.NO_KONTENER]);
      if(!noKontener) return;
      map[noKontener] = {
        etd: parseIDDateFlexible(r[COL2.ETD]),
        eta: parseIDDateFlexible(r[COL2.ETA]),
        tujuan: r[COL2.TUJUAN],
        noOrder: r[COL2.NO_ORDER],
        ekspedisi: r[COL2.EKSPEDISI]
      };
    });
  }catch(err){
    console.warn('Gagal ambil data Konfirmasi Armada:', err.message);
  }
  return map;
}

// handle format tanggal ISO (2026-07-05) maupun dd/mm/yyyy
function parseIDDateFlexible(str){
  if(!str) return null;
  str = str.toString().trim();
  if(!str) return null;
  const iso = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso) return new Date(parseInt(iso[1]), parseInt(iso[2])-1, parseInt(iso[3]));
  const idFmt = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(idFmt) return new Date(parseInt(idFmt[3]), parseInt(idFmt[2])-1, parseInt(idFmt[1]));
  return null;
}

// header di row 1 spreadsheet -> index 0 di array (0-based), data mulai row 2
const HEADER_ROW_INDEX = 0;
const DATA_START_INDEX = 1;

// index kolom absolut (A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8, J=9, K=10, L=11, M=12, N=13, O=14, P=15)
const COL = {
  DISTRIBUTOR_NAME: 1,
  DELIVERY_NAME: 3,
  SHIP_DATE: 6,
  ARRIVAL_DATE: 7,
  RECEIPT_DATE: 8,
  RECEIPT_ETA: 9,
  CONTAINER: 11,
  NOPOL: 12,
  EXPEDISI: 13
};

function switchTab(tab){
  document.getElementById('tabBtnExp').classList.toggle('active', tab==='exp');
  document.getElementById('tabBtnDist').classList.toggle('active', tab==='dist');
  document.getElementById('tabBtnAlert').classList.toggle('active', tab==='alert');
  document.getElementById('panelExp').classList.toggle('active', tab==='exp');
  document.getElementById('panelDist').classList.toggle('active', tab==='dist');
  document.getElementById('panelAlert').classList.toggle('active', tab==='alert');
}

function isKontainer(r){
  return !!(r && r.container && r.container.toString().trim());
}

function daysBetween(a,b){
  const ms = b.setHours(0,0,0,0) - a.setHours(0,0,0,0);
  return Math.round(ms/86400000);
}

function renderAlertList(allRows){
  const container = document.getElementById('alertList');
  const badge = document.getElementById('alertBadge');
  container.innerHTML = '';

  const now = new Date();
  const flagged = allRows.filter(r=>{
    if(!isKontainer(r)) return false;
    if(!r.receiptETA) return false;
    if(r.arrivalDate) return false; // sudah ada tanggal arrival = dianggap sudah update
    return r.receiptETA < now;
  });

  flagged.sort((a,b)=> a.receiptETA - b.receiptETA);

  if(flagged.length===0){
    badge.style.display='none';
    container.innerHTML = '<div class="empty">✅ Tidak ada kontainer yang perlu dicek. Semua update.</div>';
    return;
  }

  badge.style.display='inline-block';
  badge.textContent = flagged.length;

  flagged.forEach(r=>{
    const hasKonfirmasi = !!(r.konfirmasiETA || r.konfirmasiETD);
    const effectiveETA = r.konfirmasiETA || r.receiptETA;
    const overdueDays = daysBetween(new Date(effectiveETA), new Date(now));
    const dest = extractDestination(r.deliveryName);
    const containerNo = r.container || r.nopol || '';
    const div = document.createElement('div');
    div.className = 'alert-card';

    if(hasKonfirmasi){
      div.style.borderLeftColor = 'var(--hit)';
      div.style.borderColor = 'rgba(46,204,113,.35)';
      div.innerHTML = `
        <div class="card-top">
          <div>
            <div class="card-title">${containerNo || '(no. kontainer kosong)'}</div>
            <div class="card-sub">${r.expedisi} — ${r.deliveryName}${dest?(' → '+dest):''}</div>
            <div class="card-sub" style="color:var(--hit)">✅ Ada jadwal dari konfirmasi ekspedisi${r.konfirmasiNoOrder?' ('+r.konfirmasiNoOrder+')':''}</div>
          </div>
          <div class="alert-days" style="background:rgba(46,204,113,.12);color:var(--hit)">${overdueDays} hari lewat ETA</div>
        </div>
        <div class="dot-detail" style="margin-top:8px;">
          <span>ETD Konfirmasi: <b>${fmtDate(r.konfirmasiETD)}</b></span>
          <span>ETA Konfirmasi: <b>${fmtDate(r.konfirmasiETA)}</b></span>
          <span style="grid-column:1/-1">ETA Sheet DOT: ${fmtDate(r.receiptETA)}</span>
        </div>
        <div class="card-sub" style="margin-top:8px;">Sudah lewat ETA konfirmasi tapi belum ada Arrival Date — cek fisik/update sheet.</div>
      `;
    } else {
      div.innerHTML = `
        <div class="card-top">
          <div>
            <div class="card-title">${containerNo || '(no. kontainer kosong)'}</div>
            <div class="card-sub">${r.expedisi} — ${r.deliveryName}${dest?(' → '+dest):''}</div>
            <div class="card-sub">ETA: ${fmtDate(r.receiptETA)}</div>
            <div class="card-sub" style="color:var(--miss)">⚠️ Belum ada ETD/ETA dari konfirmasi ekspedisi</div>
          </div>
          <div class="alert-days">${overdueDays} hari lewat</div>
        </div>
        <div class="alert-links">
          <a href="https://www.google.com/search?q=${encodeURIComponent(containerNo+' container tracking')}" target="_blank">🔍 Google</a>
          <a href="https://www.myspil.com" target="_blank">SPIL</a>
          <a href="https://www.meratusline.com" target="_blank">Meratus</a>
          <a href="https://www.temasline.com" target="_blank">Temas</a>
        </div>
      `;
    }
    container.appendChild(div);
  });
}

function parseIDDate(str){
  if(!str) return null;
  str = str.toString().trim();
  const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
}

function sameDate(a,b){
  if(!a||!b) return false;
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function fmtDate(d){
  if(!d) return '-';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}

function extractDistributor(name){
  if(!name) return 'TANPA NAMA';
  return name.split(' - ')[0].trim();
}
function extractDestination(name){
  if(!name) return '';
  const parts = name.split(' - ');
  if(parts.length<2) return '';
  return parts[1].replace(/\(.*\)/,'').trim();
}

function summarize(rows){
  const total = rows.length;
  const hit = rows.filter(r=>r.hitMiss.toLowerCase()==='hit').length;
  const miss = rows.filter(r=>r.hitMiss.toLowerCase()==='miss').length;
  const pct = total>0 ? Math.round((hit/total)*1000)/10 : 0;
  return {hit,miss,total,pct};
}

function buildExpedisiText(name, rows, dateStr){
  const s = summarize(rows);
  let t = `📊 *MONITORING DOT - ${name}*\nEstimasi sampai: ${dateStr}\n\n`;
  t += `✅ Hit: ${s.hit} | ❌ Miss: ${s.miss} | 📦 Total: ${s.total} | 📈 OTD: ${s.pct}%\n`;
  const miss = rows.filter(r=>r.hitMiss.toLowerCase()==='miss');
  if(miss.length){
    t += `\n*Detail Miss:*\n`;
    miss.forEach(r=>{
      t += `- ${r.nopol||r.container} | ${r.deliveryName}${r.issue?' | Issue: '+r.issue:''}\n`;
    });
  }
  return t.trim();
}

// Hilangkan baris duplikat: nopol/kontainer + distributor + tujuan yang sama dianggap 1 kiriman
function dedupeShipments(rows, identifierField){
  const seen = new Set();
  const result = [];
  rows.forEach(r=>{
    const identifier = (r[identifierField]||'').toString().trim().toUpperCase();
    const dist = (r.distributorName || extractDistributor(r.deliveryName)).toUpperCase();
    const dest = extractDestination(r.deliveryName).toUpperCase();
    const key = identifier + '|' + dist + '|' + dest;
    if(seen.has(key)) return;
    seen.add(key);
    result.push(r);
  });
  return result;
}

function buildKonfirmasiText(name, rows, dateStr){
  const kontainerRows = dedupeShipments(rows.filter(r=>isKontainer(r)), 'container');
  const truckRows = dedupeShipments(rows.filter(r=>!isKontainer(r)), 'nopol');

  let t = `📋 *KONFIRMASI STATUS PENGIRIMAN*\n*${name}*\nEstimasi sampai: ${dateStr}\n\n`;

  if(kontainerRows.length){
    t += `🚢 *Mohon info TANGGAL SANDAR kapal untuk kontainer berikut* (untuk keperluan monitoring DOT):\n\n`;
    kontainerRows.forEach((r,i)=>{
      const dest = extractDestination(r.deliveryName);
      t += `${i+1}. No. Kontainer: *${r.container||'-'}* — ${(r.distributorName || extractDistributor(r.deliveryName))}${dest?(' ('+dest+')'):''}\n   ETA jadwal: ${fmtDate(r.receiptETA)}\n`;
    });
    t += `\nMohon dibalas dengan format:\n_No. Kontainer - Tanggal Sandar_\n`;
  }

  if(truckRows.length){
    t += `${kontainerRows.length?'\n':''}🚛 *Mohon info status unit berikut, sudah sampai tujuan atau masih perjalanan:*\n\n`;
    truckRows.forEach((r,i)=>{
      const dest = extractDestination(r.deliveryName);
      t += `${i+1}. Nopol: *${r.nopol||'-'}* — ${(r.distributorName || extractDistributor(r.deliveryName))}${dest?(' ('+dest+')'):''}\n`;
    });
  }

  t += `\nMohon konfirmasinya, terima kasih 🙏`;
  return t.trim();
}

function buildDistributorPendingText(distributorName, items){
  let t = `🚚 *INFO ARMADA TIBA - MOHON SEGERA DIBONGKAR*\n*${distributorName}*\n\n`;
  items.forEach((it,i)=>{
    const days = it.arrivalDate ? daysBetween(new Date(it.arrivalDate), new Date()) : null;
    const label = it.type==='kontainer' ? 'No. Kontainer' : 'Nopol';
    t += `${i+1}. ${label}: *${it.identifier}* (${it.expedisi})\n   ${it.type==='kontainer'?'Sandar':'Tiba gudang'}: ${fmtDate(it.arrivalDate)}${days!==null?` (${days} hari lalu)`:''}\n`;
  });
  t += `\nMohon segera dijadwalkan bongkar, terima kasih 🙏`;
  return t.trim();
}

function renderDistributorPendingCard(container, distributorName, items){
  const phone = getPhone('dist', distributorName);
  const text = buildDistributorPendingText(distributorName, items);
  const kontainerCount = items.filter(it=>it.type==='kontainer').length;
  const truckCount = items.filter(it=>it.type==='truck').length;

  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-title">${distributorName}</div>
        <div class="card-sub">🚢 ${kontainerCount} kontainer &nbsp; 🚛 ${truckCount} truk — belum bongkar</div>
      </div>
    </div>
    <input class="phone-input" type="tel" placeholder="No. WA (628xxxxxxxxxx)" value="${phone}" data-type="dist" data-key="${distributorName.replace(/"/g,'&quot;')}">
    <div class="card-actions">
      <a class="btn wa" style="flex:1;" target="_blank" href="${waLink(phone,text)}">Kirim Laporan</a>
    </div>
    <details>
      <summary>Lihat detail (${items.length} unit)</summary>
      ${items.map(it=>{
        const days = it.arrivalDate ? daysBetween(new Date(it.arrivalDate), new Date()) : null;
        return `<div class="detail-row">
          <b>${it.identifier}</b> — ${it.expedisi} — ${it.type==='kontainer'?'Sandar':'Tiba'}: ${fmtDate(it.arrivalDate)}${days!==null?` (${days} hari lalu)`:''}
        </div>`;
      }).join('')}
    </details>
  `;

  const input = div.querySelector('.phone-input');
  const link = div.querySelector('.btn.wa');
  input.addEventListener('input', ()=>{
    setPhone('dist', distributorName, input.value);
    link.href = waLink(input.value, text);
  });

  container.appendChild(div);
}

function getPhone(type, key){
  return localStorage.getItem(`wa_${type}_${key}`) || '';
}
function setPhone(type, key, val){
  localStorage.setItem(`wa_${type}_${key}`, val);
}

function waLink(phone, text){
  const clean = (phone||'').replace(/[^0-9]/g,'');
  const base = clean ? `https://wa.me/${clean}` : `https://wa.me/`;
  return `${base}?text=${encodeURIComponent(text)}`;
}

function renderGroupCard(container, type, key, rows, dateStr, textBuilder, badgeExtra, konfirmasiBuilder){
  const s = summarize(rows);
  const text = textBuilder(key, rows, dateStr);
  const phone = getPhone(type, key);
  const konfirmasiText = konfirmasiBuilder ? konfirmasiBuilder(key, rows, dateStr) : null;

  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-title">${key}</div>
        <div class="card-sub">${badgeExtra||''}</div>
      </div>
      <div class="pctbadge ${s.pct>=93?'good':'bad'}">${s.pct}%</div>
    </div>
    <div class="mini-stats">
      <span>✅ Hit <b>${s.hit}</b></span>
      <span>❌ Miss <b>${s.miss}</b></span>
      <span>📦 Total <b>${s.total}</b></span>
    </div>
    <input class="phone-input" type="tel" placeholder="No. WA (628xxxxxxxxxx)" value="${phone}" data-type="${type}" data-key="${key.replace(/"/g,'&quot;')}">
    <div class="card-actions">
      ${type==='exp' && konfirmasiText ? '' : `<a class="btn wa" target="_blank" href="${waLink(phone,text)}" data-linkfor="${key}">Kirim Laporan</a>`}
      ${konfirmasiText ? `<a class="btn wa-konfirmasi" target="_blank" href="${waLink(phone,konfirmasiText)}" data-linkfor-konfirmasi="${key}">Minta Konfirmasi</a>` : ''}
    </div>
    <details>
      <summary>Lihat detail data DOT (${rows.length} unit)</summary>
      ${rows.map(r=>`
        <div class="detail-row">
          <b>${r.nopol||r.container}</b> — ${r.deliveryName} —
          <span style="color:${r.hitMiss.toLowerCase()==='hit'?'var(--hit)':'var(--miss)'}">${r.hitMiss||'-'}</span>
          ${r.issue?' — '+r.issue:''}
          <div class="dot-detail">
            <span>Kendaraan: <b>${r.vehicle||'-'}</b></span>
            <span>Ship Date: <b>${fmtDate(r.shipDate)}</b></span>
            <span>ETA (Sheet DOT): <b>${fmtDate(r.receiptETA)}</b></span>
            <span>Arrival: <b>${fmtDate(r.arrivalDate)}</b></span>
            <span>Receipt Date: <b>${fmtDate(r.receiptDate)}</b></span>
            ${r.konfirmasiETD || r.konfirmasiETA ? `
            <span style="color:var(--hit)">ETD (Konfirmasi Eksp): <b>${fmtDate(r.konfirmasiETD)}</b></span>
            <span style="color:var(--hit)">ETA (Konfirmasi Eksp): <b>${fmtDate(r.konfirmasiETA)}</b></span>` : `
            <span style="color:var(--muted);grid-column:1/-1">⚠️ Belum ada ETD/ETA dari konfirmasi ekspedisi</span>`}
          </div>
        </div>`).join('')}
    </details>
  `;

  const input = div.querySelector('.phone-input');
  const link = div.querySelector('.btn.wa');
  input.addEventListener('input', ()=>{
    setPhone(type, key, input.value);
    if(link) link.href = waLink(input.value, text);
    const linkK = div.querySelector('.wa-konfirmasi');
    if(linkK) linkK.href = waLink(input.value, konfirmasiText);
  });

  container.appendChild(div);
}

async function loadReport(){
  const statusEl = document.getElementById('status');
  const dateInput = document.getElementById('reportDate');
  const targetDate = dateInput.value ? new Date(dateInput.value+'T00:00:00') : new Date();
  const dateStrDisplay = fmtDate(targetDate);

  statusEl.textContent = 'Memuat data dari sheet...';
  document.getElementById('overallStats').style.display = 'none';
  document.getElementById('expedisiList').innerHTML = '';
  document.getElementById('distributorList').innerHTML = '';

  let csvText;
  let konfirmasiMap = {};
  let distributorPendingRows = [];
  try{
    csvText = await fetch(CSV_URL).then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); });
  }catch(err){
    statusEl.textContent = '⚠️ Gagal ambil data dari sheet "Plan Delivery 2026". Pastikan sudah di-Publish to Web (File > Share > Publish to web), bukan cuma "Anyone with the link". (' + err.message + ')';
    return;
  }
  try{
    konfirmasiMap = await fetchKonfirmasiArmada();
  }catch(err){
    console.warn('Konfirmasi Armada gagal dimuat, lanjut tanpa data ini:', err.message);
  }
  try{
    distributorPendingRows = await fetchDistributorPending();
  }catch(err){
    console.warn('Data distributor pending gagal dimuat, lanjut tanpa data ini:', err.message);
  }

  const parsed = Papa.parse(csvText, {skipEmptyLines:false});
  const allRows = parsed.data.slice(DATA_START_INDEX);

  const rows = [];
  allRows.forEach(r=>{
    const nopol = r[COL.NOPOL];
    const container = r[COL.CONTAINER];
    const expedisi = (r[COL.EXPEDISI]||'').trim();
    if(!nopol && !container && !expedisi) return;
    const containerNorm = normalizeContainer(container);
    const konf = containerNorm ? konfirmasiMap[containerNorm] : null;
    const receiptETA = parseIDDate(r[COL.RECEIPT_ETA]);
    const receiptDate = parseIDDate(r[COL.RECEIPT_DATE]);
    let hitMiss = '';
    if(receiptDate && receiptETA){
      hitMiss = receiptDate <= receiptETA ? 'Hit' : 'Miss';
    }
    rows.push({
      nopol: nopol,
      container: container,
      expedisi: expedisi || 'TANPA EKSPEDISI',
      distributorName: (r[COL.DISTRIBUTOR_NAME]||'').trim(),
      deliveryName: (r[COL.DELIVERY_NAME]||'').trim(),
      shipDate: parseIDDate(r[COL.SHIP_DATE]),
      receiptETA: receiptETA,
      arrivalDate: parseIDDate(r[COL.ARRIVAL_DATE]),
      receiptDate: receiptDate,
      issue: '',
      hitMiss: hitMiss,
      konfirmasiETD: konf ? konf.etd : null,
      konfirmasiETA: konf ? konf.eta : null,
      konfirmasiNoOrder: konf ? konf.noOrder : null
    });
  });

  const todayRows = rows.filter(r=>sameDate(r.receiptETA, targetDate));

  renderAlertList(rows);

  // Tab Distributor: independen dari tanggal, tampilkan SEMUA yang belum bongkar saat ini
  const byDistributorPending = {};
  distributorPendingRows.forEach(it=>{
    const d = extractDistributor(it.destination);
    (byDistributorPending[d] = byDistributorPending[d]||[]).push(it);
  });
  const distContainer = document.getElementById('distributorList');
  if(Object.keys(byDistributorPending).length===0){
    distContainer.innerHTML = '<div class="empty">✅ Tidak ada kiriman yang belum bongkar</div>';
  } else {
    Object.keys(byDistributorPending).sort().forEach(key=>{
      renderDistributorPendingCard(distContainer, key, byDistributorPending[key]);
    });
  }

  const byExpedisi = {};
  todayRows.forEach(r=>{
    (byExpedisi[r.expedisi] = byExpedisi[r.expedisi]||[]).push(r);
  });
  const expedisiContainer = document.getElementById('expedisiList');
  if(Object.keys(byExpedisi).length===0){
    expedisiContainer.innerHTML = '<div class="empty">Tidak ada data dengan Receipt ETA di tanggal ini</div>';
  } else {
    Object.keys(byExpedisi).sort().forEach(key=>{
      renderGroupCard(expedisiContainer, 'exp', key, byExpedisi[key], dateStrDisplay, buildExpedisiText, null, buildKonfirmasiText);
    });
  }

  if(todayRows.length===0){
    statusEl.textContent = `Tidak ada data dengan Receipt ETA = ${dateStrDisplay}`;
    return;
  }

  statusEl.textContent = `Menampilkan ${todayRows.length} pengiriman dengan estimasi sampai ${dateStrDisplay}`;

  const overall = summarize(todayRows);
  document.getElementById('overallStats').style.display = 'grid';
  document.getElementById('ovHit').textContent = overall.hit;
  document.getElementById('ovMiss').textContent = overall.miss;
  document.getElementById('ovTotal').textContent = overall.total;
  document.getElementById('ovPct').textContent = overall.pct + '%';
}

document.getElementById('reportDate').valueAsDate = new Date();
loadReport();
</script>
